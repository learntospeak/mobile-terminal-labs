function esc(v){return String(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function render(){document.getElementById('tree').innerHTML=rows.map(r=>r[0]==='d'?`<span class="folder">${esc(r[1])}</span>`:`<a href="${esc(r[2])}">${esc(r[1])}</a> <span class="muted">:: ${esc(r[3])}</span>`).join('\n')}

document.getElementById('unlock').onclick=()=>{if(document.getElementById('word').value.trim().toLowerCase()==='patch'){sessionStorage.setItem('devIndex','1');show()}else alert('Nope')};
