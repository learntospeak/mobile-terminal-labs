<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patch Ping Run Tree Prototype</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 10%,rgba(34,211,238,.16),transparent 28%),linear-gradient(135deg,#020617,#07111f 58%,#111827);color:#e5f3ff;font-family:system-ui,-apple-system,Segoe UI,sans-serif;padding:14px}.shell{width:min(1280px,100%);margin:0 auto;display:grid;gap:14px}.top{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:16px;border:1px solid rgba(125,211,252,.22);border-radius:22px;background:rgba(15,23,42,.78)}.back,.btn{min-height:42px;border-radius:12px;border:1px solid rgba(125,211,252,.3);background:#0f172a;color:#bfdbfe;text-decoration:none;font-weight:900;padding:0 12px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}.kicker{margin:0 0 6px;color:#67e8f9;font-size:12px;font-weight:1000;letter-spacing:.16em;text-transform:uppercase}h1{margin:0;color:#f8fafc}.copy{margin:5px 0 0;color:#b6c7d9}.stats{padding:10px 12px;border-radius:14px;border:1px solid rgba(250,204,21,.34);background:rgba(24,18,3,.5);color:#fde68a;font-weight:900}.map-card{position:relative;min-height:760px;border:1px solid rgba(56,189,248,.26);border-radius:24px;background:linear-gradient(rgba(56,189,248,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.055) 1px,transparent 1px),radial-gradient(circle at 55% 50%,rgba(14,165,233,.14),transparent 45%),#020617;background-size:32px 32px,32px 32px,auto,auto;overflow:auto}.map-inner{position:relative;min-width:1150px;height:760px}.lines{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}.line{fill:none;stroke:rgba(248,113,113,.7);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 5px rgba(248,113,113,.18))}.node{position:absolute;z-index:2;width:104px;min-height:72px;border:0;background:transparent;color:#dbeafe;font:inherit;font-size:10px;font-weight:900;text-align:center;cursor:pointer;text-shadow:0 0 8px rgba(219,234,254,.26);padding:0}.node strong{display:block;font-size:34px;line-height:1;filter:drop-shadow(0 0 13px rgba(103,232,249,.5)) drop-shadow(0 7px 8px rgba(0,0,0,.52));margin-bottom:4px}.node small{display:block;color:#94a3b8;font-size:9px}.node.current strong{animation:pulse 1.1s ease-in-out infinite;color:#86efac!important}.node.available strong{filter:drop-shadow(0 0 18px rgba(103,232,249,.86)) drop-shadow(0 7px 8px rgba(0,0,0,.52))}.core strong{color:#c4b5fd}.server strong,.target strong{color:#fde68a;filter:drop-shadow(0 0 20px rgba(250,204,21,.75)) drop-shadow(0 7px 10px rgba(0,0,0,.55))}.client strong{color:#93c5fd}.printer strong{color:#fecaca}.security strong{color:#fecdd3}.wireless strong{color:#86efac}.storage strong{color:#fcd34d}.decoy strong{color:#fdba74}@keyframes pulse{50%{transform:translateY(-5px) scale(1.1)}}.worm{position:absolute;z-index:4;width:94px;height:34px;border-radius:999px;background:linear-gradient(90deg,#22c55e,#67e8f9);display:grid;place-items:center;color:#020617;font-family:Consolas,monospace;font-weight:1000;box-shadow:0 0 32px rgba(34,211,238,.48);transition:left .26s ease,top .26s ease}.console{padding:14px;border:1px solid rgba(125,211,252,.22);border-radius:18px;background:#020617;color:#bfdbfe;font-family:Consolas,monospace;line-height:1.45}.terminal{display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:8px;align-items:center;margin-top:10px}.terminal label{color:#93c5fd}.terminal input{min-height:42px;border-radius:10px;border:1px solid rgba(125,211,252,.26);background:#020617;color:#f8fafc;padding:0 10px;font-family:Consolas,monospace}.terminal button{min-height:42px;border-radius:10px;border:1px solid rgba(34,197,94,.32);background:linear-gradient(180deg,#22c55e,#15803d);color:white;font-weight:900}.reward{position:fixed;inset:0;z-index:20;display:grid;place-items:center;background:rgba(2,6,23,.84);padding:18px}.reward[hidden]{display:none}.egg-card{width:min(420px,100%);padding:24px;border-radius:28px;border:1px solid rgba(250,204,21,.48);background:linear-gradient(180deg,rgba(69,26,3,.86),rgba(2,6,23,.96));text-align:center;box-shadow:0 0 70px rgba(250,204,21,.26)}.egg{position:relative;margin:16px auto;width:120px;height:154px;border-radius:50% 50% 44% 44%;background:radial-gradient(circle at 31% 22%,#fffbd1 0 8%,transparent 9%),linear-gradient(135deg,#fff7ad,#facc15 30%,#f59e0b 52%,#92400e);box-shadow:0 0 64px rgba(250,204,21,.76),inset -12px -16px 22px rgba(69,26,3,.35),inset 10px 9px 18px rgba(255,255,255,.32)}.egg:before{content:'◆';position:absolute;top:-31px;left:40px;color:#fef3c7;font-size:40px;text-shadow:0 0 22px #facc15}.egg:after{content:'◕  ◕';position:absolute;top:56px;left:33px;color:#451a03;font-weight:1000}@media(max-width:760px){body{padding:8px}.top{grid-template-columns:1fr}.map-card{min-height:680px}.map-inner{min-width:1050px;height:720px}.terminal{grid-template-columns:1fr}.node{width:86px;font-size:8px}.node strong{font-size:26px}}
</style>
</head>
<body>
<main class="shell">
<header class="top"><a class="back" href="./patch-ping-run-standalone.html?v=tree-back">← Old prototype</a><div><p class="kicker">Clean tree prototype</p><h1>Patch Ping Run</h1><p class="copy">Organised office topology. Every visible line is clickable travel logic.</p></div><div class="stats">Hops: <span id="hops">0</span></div></header>
<section class="map-card"><div id="map" class="map-inner"><svg id="lines" class="lines"></svg><div id="nodes"></div><div id="worm" class="worm">&gt;_</div></div></section>
<section class="console"><div id="log">Patch: Start at YOUR-PC. Follow the office tree to FILESERV.</div><form id="terminal" class="terminal"><label>C:\Lab&gt;</label><input id="cmd" autocomplete="off" spellcheck="false" placeholder="try: tracert fileserver or ping fileserver"><button type="submit">Run</button></form></section>
</main>
<section id="reward" class="reward" hidden><div class="egg-card"><p class="kicker">Legendary reward</p><div class="egg"></div><h2>Golden Egg Found</h2><p>Packet delivered to FILESERV through the secure office route.</p><button id="again" class="btn" type="button">Play again</button></div></section>
<script>
(function(){
const nodes={
 'YOUR-PC':[5,48,'💻','client','start'], 'ACCESS-SW':[19,48,'▤','core','switch'], 'ROUTER-A':[33,48,'◉','core','router'], 'CORE-SW':[47,48,'◎','core','core'], 'FIREWALL':[61,48,'🛡','security','secure hop'], 'VAULT-GATE':[75,48,'◆','security','secure branch'], 'FILESERV':[90,48,'🗄','target','target'],
 'SALES-01':[5,14,'💻','client','sales'], 'SALES-02':[5,24,'💻','client','sales'], 'SALES-PRN':[5,34,'🖨','printer','sales printer'],
 'RECEPTION':[5,64,'💻','client','front desk'], 'LOBBY-AP':[5,74,'📡','wireless','wifi'], 'KIOSK':[5,84,'▣','decoy','kiosk'],
 'DNS01':[33,18,'🗄','server','dns'], 'DHCP01':[33,30,'🗄','server','dhcp'], 'WEB-DMZ':[47,18,'🌐','decoy','dmz'], 'ARCHIVE':[47,30,'▣','decoy','archive'],
 'ACCOUNTS-PC':[61,18,'💻','client','accounts'], 'NAS-ACCOUNTS':[75,18,'▦','storage','accounts nas'], 'PAYROLL':[90,18,'💻','client','payroll'],
 'WAREHOUSE-PC':[61,78,'💻','client','warehouse'], 'SCANNER':[75,78,'▤','decoy','scanner'], 'LABEL-PRN':[90,78,'🖨','printer','label printer'],
 'BACKUP-NAS':[90,34,'▦','storage','wrong server'], 'MONITOR01':[75,64,'▣','decoy','monitor'], 'PACKET-LOSS':[61,64,'☁','decoy','unstable'], 'DOOR-CTRL':[90,64,'▣','security','door']
};
const edges=[['YOUR-PC','ACCESS-SW'],['ACCESS-SW','ROUTER-A'],['ROUTER-A','CORE-SW'],['CORE-SW','FIREWALL'],['FIREWALL','VAULT-GATE'],['VAULT-GATE','FILESERV'],['ACCESS-SW','SALES-01'],['ACCESS-SW','SALES-02'],['ACCESS-SW','SALES-PRN'],['ACCESS-SW','RECEPTION'],['ACCESS-SW','LOBBY-AP'],['LOBBY-AP','KIOSK'],['ROUTER-A','DNS01'],['ROUTER-A','DHCP01'],['ROUTER-A','WEB-DMZ'],['ROUTER-A','ARCHIVE'],['CORE-SW','ACCOUNTS-PC'],['ACCOUNTS-PC','NAS-ACCOUNTS'],['NAS-ACCOUNTS','PAYROLL'],['NAS-ACCOUNTS','BACKUP-NAS'],['CORE-SW','WAREHOUSE-PC'],['WAREHOUSE-PC','SCANNER'],['SCANNER','LABEL-PRN'],['CORE-SW','PACKET-LOSS'],['PACKET-LOSS','MONITOR01'],['VAULT-GATE','DOOR-CTRL']];
const graph={}; edges.forEach(([a,b])=>{(graph[a]||(graph[a]=[])).push(b);(graph[b]||(graph[b]=[])).push(a)});
let current='YOUR-PC',hops=0,busy=false;
const $=s=>document.querySelector(s);
function render(){const holder=$('#nodes');holder.innerHTML='';Object.entries(nodes).forEach(([id,n])=>{const b=document.createElement('button');b.type='button';b.className='node '+n[3];b.dataset.id=id;b.style.left=n[0]+'%';b.style.top=n[1]+'%';b.innerHTML='<strong>'+n[2]+'</strong>'+id+'<small>'+n[4]+'</small>';b.onclick=()=>move(id);holder.appendChild(b)});draw();update()}
function center(id){const map=$('#map'),el=document.querySelector('[data-id="'+id+'"]');const mr=map.getBoundingClientRect(),er=el.getBoundingClientRect();return{x:er.left-mr.left+er.width/2,y:er.top-mr.top+er.height/2}}
function draw(){const svg=$('#lines'),map=$('#map'),mr=map.getBoundingClientRect();svg.setAttribute('viewBox','0 0 '+mr.width+' '+mr.height);svg.innerHTML='';edges.forEach(([a,b])=>{const A=center(a),B=center(b),mid=(A.x+B.x)/2;const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d','M '+A.x+' '+A.y+' L '+mid+' '+A.y+' L '+mid+' '+B.y+' L '+B.x+' '+B.y);p.setAttribute('class','line');svg.appendChild(p)})}
function update(){document.querySelectorAll('.node').forEach(n=>{n.classList.toggle('current',n.dataset.id===current);n.classList.toggle('available',(graph[current]||[]).includes(n.dataset.id))});$('#hops').textContent=hops;const c=center(current),w=$('#worm');w.style.left=(c.x-w.offsetWidth/2)+'px';w.style.top=(c.y-45)+'px'}
function move(id){if(busy||id===current)return;if(!(graph[current]||[]).includes(id)){log('Patch: No direct link to '+id+'. Follow the tree lines.');return}current=id;hops++;update();if(id==='FILESERV'){log('Patch: FILESERV reached. Golden Egg unlocked.');setTimeout(()=>$('#reward').hidden=false,300)}else log('Patch: Reached '+id+'. Choose the next connected hop.')}
function log(t){$('#log').textContent=t}
function reset(){current='YOUR-PC';hops=0;$('#reward').hidden=true;log('Patch: Start at YOUR-PC. Follow the office tree to FILESERV.');update()}
async function travel(path){busy=true;for(const id of path.slice(1)){current=id;hops++;update();log('Patch: hop -> '+id);await new Promise(r=>setTimeout(r,360))}busy=false;if(current==='FILESERV'){log('Patch: FILESERV reached. Golden Egg unlocked.');setTimeout(()=>$('#reward').hidden=false,300)}}
$('#terminal').onsubmit=e=>{e.preventDefault();const cmd=$('#cmd').value.trim().toLowerCase();$('#cmd').value='';if(cmd==='tracert fileserver'||cmd==='ping fileserver')travel(['YOUR-PC','ACCESS-SW','ROUTER-A','CORE-SW','FIREWALL','VAULT-GATE','FILESERV']);else if(cmd==='route print')travel(['YOUR-PC','ACCESS-SW','ROUTER-A','CORE-SW']);else if(cmd==='arp -a')travel(['YOUR-PC','ACCESS-SW']);else log('Try: arp -a, route print, tracert fileserver, ping fileserver')};
$('#again').onclick=reset;window.onresize=()=>{draw();update()};render();
})();
</script>
</body>
</html>
