<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Flow Risk Report</title><link rel="stylesheet" href="./homepage-dashboard.css?v=20260520dash1"><style>body.home-dashboard{padding:16px}.shell{width:min(1180px,100%);margin:0 auto;display:grid;gap:16px}.card{padding:20px;border:1px solid rgba(96,165,250,.22);border-radius:18px;background:linear-gradient(180deg,rgba(8,13,24,.94),rgba(4,8,15,.98))}.copy{color:#cbd5e1}.btn{min-height:44px;padding:0 14px;border-radius:10px;border:1px solid rgba(96,165,250,.34);background:#0f172a;color:#fff;font-weight:900}.table{overflow:auto;border:1px solid rgba(96,165,250,.18);border-radius:14px}table{width:100%;border-collapse:collapse;min-width:900px}th,td{padding:10px;border-bottom:1px solid rgba(96,165,250,.12);text-align:left;color:#dbeafe}th{background:#020617;color:#93c5fd}.warn td{color:#fde68a}.bad td{color:#fecaca}</style><script src="./stateManager.js" defer></script><script src="./scenarioEngine.js" defer></script><script src="./mascot.js" defer></script></head><body class="home-dashboard"><main class="shell"><section class="card"><a class="dashboard-secondary-btn" href="./admin-tree.html?v=flowrisk1">← Dev Tree</a><h1>Ahead-of-Flow Risk Report</h1><p class="copy">Flags labs where learners may get ahead of the script: folder steps without recovery, read steps without recovery, and action steps without recovery.</p><button id="run" class="btn">Run Report</button><button id="download" class="btn">Download JSON</button></section><section class="card"><h2 id="summary">Ready</h2><div class="table"><table><thead><tr><th>Risk</th><th>Lab</th><th>Step</th><th>Issue</th><th>Why it matters</th></tr></thead><tbody id="body"></tbody></table></div></section></main><script>let latest=null;function esc(v){return String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function text(s){return [s.objective,s.context,s.demoCommand,(s.hints||[]).join(' ')].filter(Boolean).join(' ').toLowerCase()}function hasRecovery(s){return (s.exploration||[]).length||(s.partials||[]).length}function kind(s){let t=text(s),f=String(s.commandFamily||'').toLowerCase();if(f==='cd'||t.includes('folder')||t.includes('directory'))return 'folder';if(['type','cat','more'].includes(f)||t.includes('read'))return 'read';if(['copy','xcopy','move','ren','mkdir','rmdir','del','echo','taskkill','shutdown','net','sc'].includes(f))return 'action';return ''}function run(){let scenarios=(window.ScenarioEngine&&ScenarioEngine.scenarios)||[];let rows=[];scenarios.forEach(sc=>{(sc.steps||[]).forEach((st,i)=>{let k=kind(st);if(!k)return;let rec=hasRecovery(st);let accepts=(st.accepts||[]).length;if(!rec||!accepts){rows.push({risk:!accepts?'error':'warning',lab:sc.title||sc.id,id:sc.id,step:i+1,issue:k+' step may not catch up',why:!accepts?'No accept rule found.':'No recovery/partial/exploration rule found.'})}})});latest={generatedAt:new Date().toISOString(),summary:{total:rows.length,errors:rows.filter(r=>r.risk==='error').length,warnings:rows.filter(r=>r.risk==='warning').length},rows};document.getElementById('summary').textContent=latest.summary.errors+' errors · '+latest.summary.warnings+' warnings · '+latest.summary.total+' risks';document.getElementById('body').innerHTML=rows.map(r=>'<tr class="'+(r.risk==='error'?'bad':'warn')+'"><td>'+esc(r.risk)+'</td><td>'+esc(r.lab)+'<br><small>'+esc(r.id)+'</small></td><td>'+r.step+'</td><td>'+esc(r.issue)+'</td><td>'+esc(r.why)+'</td></tr>').join('')}function download(){if(!latest)run();let b=new Blob([JSON.stringify(latest,null,2)],{type:'application/json'});let u=URL.createObjectURL(b);let a=document.createElement('a');a.href=u;a.download='ahead-of-flow-risk-report.json';a.click();setTimeout(()=>URL.revokeObjectURL(u),1000)}document.getElementById('run').onclick=run;document.getElementById('download').onclick=download;window.addEventListener('DOMContentLoaded',run);</script></body></html>
