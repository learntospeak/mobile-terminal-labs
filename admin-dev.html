<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetLab Dev Index</title>
  <link rel="stylesheet" href="./homepage-dashboard.css?v=20260520dash1">
  <style>
    body.home-dashboard{padding:16px}.shell{width:min(1180px,100%);margin:0 auto;display:grid;gap:16px}.card{padding:20px;border:1px solid rgba(96,165,250,.22);border-radius:18px;background:linear-gradient(180deg,rgba(8,13,24,.94),rgba(4,8,15,.98));box-shadow:0 22px 56px rgba(0,0,0,.3)}.copy{color:#cbd5e1;line-height:1.6}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}.link{display:block;padding:14px;border:1px solid rgba(96,165,250,.22);border-radius:14px;background:rgba(2,6,23,.5);color:#e0f2fe;text-decoration:none}.link strong{display:block;color:#fff;margin-bottom:6px}.link span{display:block;color:#94a3b8;font-size:14px}.input{width:100%;min-height:46px;border-radius:10px;border:1px solid rgba(96,165,250,.28);background:#020617;color:#f8fafc;padding:0 12px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.btn{min-height:46px;padding:0 16px;border-radius:10px;border:1px solid rgba(96,165,250,.34);background:linear-gradient(180deg,#22c55e,#15803d);color:white;font-weight:900;cursor:pointer}.note{font-size:13px;color:#fbbf24}.hidden{display:none!important}
  </style>
</head>
<body class="home-dashboard">
  <main class="shell">
    <section id="gate" class="card">
      <h1>Dev Area</h1>
      <p class="copy">Enter the access word used for testing links.</p>
      <input id="word" class="input" type="password" placeholder="Access word">
      <div class="actions"><button id="unlock" class="btn" type="button">Unlock</button></div>
      <p class="note">Client-side gate only. This hides tools from normal navigation; it is not server security.</p>
    </section>
    <section id="content" class="card hidden">
      <a class="dashboard-secondary-btn" href="./index.html">← Back Home</a>
      <h1>NetLab Dev Index</h1>
      <p class="copy">Smoke tests, reports, and direct terminal lab links.</p>
      <div class="grid" id="links"></div>
    </section>
  </main>
  <script>
    const links=[
      ['Emulator Smoke Test','Windows/Linux/Cisco emulator checks','./emulator-smoke-test.html?v=dev1'],
      ['Connectivity Smoke Test','Diagnostic labs smoke test','./connectivity-smoke-test.html?v=dev1'],
      ['Lab Flow Report','Engagement table and flow cheat sheet','./lab-flow-report.html?v=dev1'],
      ['Incident Folder Triage','Gold standard long beginner workflow','./terminal-coach.html?track=windows&mode=beginner&scenario=win-dir-incident-triage&resetLab=1&v=dev1'],
      ['Notes Folder','Expanded notes workflow','./terminal-coach.html?track=windows&mode=beginner&scenario=win-cd-notes-folder&resetLab=1&v=dev1'],
      ['Hidden Attributes','Hidden file workflow','./terminal-coach.html?track=windows&mode=beginner&scenario=win-attrib-hidden-plan&resetLab=1&v=dev1'],
      ['Xcopy Toolkit','Toolkit copy workflow','./terminal-coach.html?track=windows&mode=beginner&scenario=win-xcopy-toolkit-bundle&resetLab=1&v=dev1'],
      ['Fileserver Ping','Network diagnostic workflow','./terminal-coach.html?track=windows&mode=beginner&scenario=win-ping-fileserver&resetLab=1&v=dev1'],
      ['Taskkill Updater','Process investigation workflow','./terminal-coach.html?track=windows&mode=beginner&scenario=win-taskkill-updater&resetLab=1&v=dev1'],
      ['Delete Old Dump','Safe cleanup workflow','./terminal-coach.html?track=windows&mode=beginner&scenario=win-delete-old-dump&resetLab=1&v=dev1'],
      ['Type / More Audit','Long text review workflow','./terminal-coach.html?track=windows&mode=beginner&scenario=win-type-more-audit-log&resetLab=1&v=dev1'],
      ['Host + User Identity','Identity evidence workflow','./terminal-coach.html?track=windows&mode=beginner&scenario=win-host-and-user-identity&resetLab=1&v=dev1']
    ];
    function esc(v){return String(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
    function show(){document.getElementById('gate').classList.add('hidden');document.getElementById('content').classList.remove('hidden');document.getElementById('links').innerHTML=links.map(x=>`<a class="link" href="${esc(x[2])}"><strong>${esc(x[0])}</strong><span>${esc(x[1])}</span></a>`).join('')}
    function ok(){return document.getElementById('word').value.trim().toLowerCase()==='patch'}
    if(sessionStorage.getItem('devIndex')==='1')show();
    document.getElementById('unlock').onclick=()=>{if(ok()){sessionStorage.setItem('devIndex','1');show()}else alert('Nope')};
    document.getElementById('word').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('unlock').click()});
  </script>
</body>
</html>
