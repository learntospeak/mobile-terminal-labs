<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button Smoke Test</title>
<link rel="stylesheet" href="./homepage-dashboard.css?v=20260520dash1">
<style>
body.home-dashboard{padding:16px}.shell{width:min(1200px,100%);margin:0 auto;display:grid;gap:16px}.card{padding:20px;border:1px solid rgba(96,165,250,.22);border-radius:18px;background:linear-gradient(180deg,rgba(8,13,24,.94),rgba(4,8,15,.98));box-shadow:0 22px 56px rgba(0,0,0,.3)}.copy{color:#cbd5e1;line-height:1.6}.btn{min-height:44px;padding:0 14px;border-radius:10px;border:1px solid rgba(96,165,250,.34);background:#0f172a;color:#fff;font-weight:900;cursor:pointer}.btn.primary{background:linear-gradient(180deg,#22c55e,#15803d)}.summary{display:flex;flex-wrap:wrap;gap:10px}.pill{padding:8px 10px;border-radius:999px;border:1px solid rgba(96,165,250,.22);background:#020617;color:#dbeafe;font-weight:800}.ok{color:#86efac}.warn{color:#fde68a}.bad{color:#fecaca}.table{overflow:auto;border:1px solid rgba(96,165,250,.18);border-radius:14px}table{width:100%;border-collapse:collapse;min-width:980px}th,td{padding:10px;border-bottom:1px solid rgba(96,165,250,.12);text-align:left;color:#dbeafe;vertical-align:top}th{background:#020617;color:#93c5fd}.row-pass td{color:#d1fae5}.row-warning td{color:#fde68a}.row-error td{color:#fecaca}iframe.smoke-frame{position:fixed;left:-10000px;top:0;border:0;opacity:.01;pointer-events:none}.target-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px}.target-grid label{display:flex;gap:8px;align-items:center;color:#cbd5e1}.viewport-grid{display:flex;flex-wrap:wrap;gap:12px;color:#cbd5e1;margin-top:10px}.viewport-grid label{display:flex;gap:8px;align-items:center}</style>
</head>
<body class="home-dashboard">
<main class="shell">
<section class="card">
<a class="dashboard-secondary-btn" href="./admin-tree.html?v=buttonsmoke6">← Dev Tree</a>
<h1>Button Smoke Test</h1>
<p class="copy">Checks mobile and desktop button usability: links, missing labels, hidden/overflowing buttons, duplicate IDs, and click-blocking layout problems. Each result includes the viewport that failed.</p>
<div class="viewport-grid" id="viewports"></div>
<div class="target-grid" id="targets"></div>
<p><button id="run" class="btn primary">Run Button Smoke Test</button> <button id="download" class="btn">Download JSON</button></p>
<div class="summary" id="summary"><span class="pill">Ready</span></div>
</section>
<section class="card">
<h2>Results</h2>
<div class="table"><table><thead><tr><th>Severity</th><th>Viewport</th><th>Page</th><th>Element</th><th>Check</th><th>Details</th></tr></thead><tbody id="body"></tbody></table></div>
</section>
</main>
<script>
const PAGES=[['Home','./index.html?v=buttonsmoke'],['Windows Lab','./terminal-coach.html?track=windows&mode=beginner&v=buttonsmoke'],['Linux Lab','./terminal-coach.html?track=linux&v=buttonsmoke'],['Cisco CLI','./cisco-cli-lab.html?v=buttonsmoke'],['Cyber Mode','./challenge-mode.html?v=buttonsmoke'],['Admin Tree','./admin-tree.html?v=buttonsmoke'],['Flow Risk','./flow-risk-report.html?v=buttonsmoke'],['Lab Flow','./lab-flow-report.html?v=buttonsmoke'],['Emulator Smoke','./emulator-smoke-test.html?v=buttonsmoke'],['Connectivity Smoke','./connectivity-smoke-test.html?v=buttonsmoke']];
const VIEWPORTS=[['Mobile 390×844',390,844],['Desktop 1366×768',1366,768]];
let latest=null;
function esc(v){return String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function row(sev,viewport,page,el,check,details){return{severity:sev,viewport:viewport,page:page,element:el,check:check,details:details||''}}
function label(el){return (el.getAttribute('aria-label')||el.getAttribute('title')||el.textContent||el.id||el.className||el.tagName).trim().replace(/\s+/g,' ').slice(0,90)}
function selector(el){if(el.id)return '#'+el.id;let name=el.tagName.toLowerCase();let txt=label(el);return name+(txt?' ['+txt+']':'')}
function visible(el,win){const cs=win.getComputedStyle(el);const r=el.getBoundingClientRect();const hiddenAncestor=el.closest('[hidden],.command-explainer-card[hidden],.command-explainer-overlay[hidden],.walkthrough-overlay[hidden],.mission-review-card[hidden],.task-complete-card[hidden]');return !hiddenAncestor&&cs.display!=='none'&&cs.visibility!=='hidden'&&Number(cs.opacity)!==0&&r.width>0&&r.height>0}
function scrollIntoViewForAudit(el,win){try{el.scrollIntoView({block:'center',inline:'center'});win.dispatchEvent(new Event('scroll'));}catch(e){}}
function coveredBy(el,doc,win){scrollIntoViewForAudit(el,win);const r=el.getBoundingClientRect();if(r.width<2||r.height<2)return null;if(r.bottom<0||r.top>win.innerHeight||r.right<0||r.left>win.innerWidth)return null;const x=Math.min(Math.max(r.left+r.width/2,0),win.innerWidth-1);const y=Math.min(Math.max(r.top+r.height/2,0),win.innerHeight-1);const top=doc.elementFromPoint(x,y);if(top&&top!==el&&!el.contains(top)&&!top.contains(el))return selector(top);return null}
function hasUsefulHandler(el){return !!el.onclick||!!el.id||!!el.getAttribute('aria-label')||!!el.getAttribute('title')||el.closest('form')||Array.from(el.attributes).some(a=>/^data-/.test(a.name))}
function auditDoc(pageName,viewportName,doc,win){const out=[];const ids={};Array.from(doc.querySelectorAll('[id]')).forEach(el=>{ids[el.id]=(ids[el.id]||0)+1});Object.keys(ids).filter(id=>ids[id]>1).forEach(id=>out.push(row('error',viewportName,pageName,'#'+id,'Duplicate ID',ids[id]+' elements use the same ID')));
const elems=Array.from(doc.querySelectorAll('button,a,[role="button"],input[type="button"],input[type="submit"]'));
elems.forEach(el=>{const name=selector(el);const tag=el.tagName.toLowerCase();const isDisabled=el.disabled||el.getAttribute('aria-disabled')==='true';const href=el.getAttribute('href')||'';const type=el.getAttribute('type')||'';const text=label(el);let v=visible(el,win);let r=el.getBoundingClientRect();
 if(!text)out.push(row('warning',viewportName,pageName,name,'Missing accessible label','No text, aria-label, title, or ID label found'));
 if(tag==='a'){if(!href)out.push(row('error',viewportName,pageName,name,'Anchor missing href','Anchor cannot navigate'));if(href==='#'||href.toLowerCase().startsWith('javascript:'))out.push(row('warning',viewportName,pageName,name,'Suspicious href',href));}
 if(tag==='button'&&!isDisabled&&type===''&&el.closest('form'))out.push(row('warning',viewportName,pageName,name,'Button in form missing type','May submit form unexpectedly'));
 if(!isDisabled&&!v){return;}
 if(v){scrollIntoViewForAudit(el,win);r=el.getBoundingClientRect();if(r.right>win.innerWidth+1||r.left<-1)out.push(row('error',viewportName,pageName,name,'Horizontal overflow','Button extends outside viewport: left '+Math.round(r.left)+', right '+Math.round(r.right)+', viewport '+win.innerWidth));if(r.width<28||r.height<28)out.push(row('warning',viewportName,pageName,name,'Small tap target','Size '+Math.round(r.width)+'x'+Math.round(r.height)));const cover=coveredBy(el,doc,win);if(cover)out.push(row('error',viewportName,pageName,name,'Click target covered','Covered by '+cover));}
 if(!isDisabled&&tag==='button'&&!hasUsefulHandler(el))out.push(row('warning',viewportName,pageName,name,'No obvious click handler','Button has no ID, form, data action, aria label, title, or onclick visible to smoke test'));
});return out;}
function loadPage(page,viewport){return new Promise(resolve=>{const frame=document.createElement('iframe');frame.className='smoke-frame';frame.style.width=viewport[1]+'px';frame.style.height=viewport[2]+'px';frame.src=page[1];let done=false;const finish=()=>{if(done)return;done=true;setTimeout(()=>{let rows=[];try{rows=auditDoc(page[0],viewport[0],frame.contentDocument,frame.contentWindow)}catch(e){rows=[row('error',viewport[0],page[0],page[1],'Unable to inspect page',e.message)]}frame.remove();resolve(rows)},1400)};frame.onload=finish;document.body.appendChild(frame);setTimeout(finish,6500)})}
async function run(){const selectedPages=Array.from(document.querySelectorAll('[data-page-check]:checked')).map(x=>Number(x.value));const selectedViewports=Array.from(document.querySelectorAll('[data-viewport-check]:checked')).map(x=>Number(x.value));const pages=selectedPages.length?selectedPages.map(i=>PAGES[i]):PAGES;const viewports=selectedViewports.length?selectedViewports.map(i=>VIEWPORTS[i]):VIEWPORTS;document.getElementById('summary').innerHTML='<span class="pill">Running '+pages.length+' pages × '+viewports.length+' viewports…</span>';let all=[];for(const vp of viewports){for(const p of pages){all=all.concat(await loadPage(p,vp));render(all)}}latest={generatedAt:new Date().toISOString(),viewports:viewports.map(v=>({name:v[0],width:v[1],height:v[2]})),pages:pages.map(p=>p[0]),summary:summary(all),results:all};render(all)}
function summary(rows){return{total:rows.length,errors:rows.filter(r=>r.severity==='error').length,warnings:rows.filter(r=>r.severity==='warning').length,passes:rows.filter(r=>r.severity==='pass').length}}
function render(rows){const s=summary(rows);document.getElementById('summary').innerHTML='<span class="pill bad">Errors: '+s.errors+'</span><span class="pill warn">Warnings: '+s.warnings+'</span><span class="pill">Total: '+s.total+'</span>';document.getElementById('body').innerHTML=rows.length?rows.map(r=>'<tr class="row-'+esc(r.severity)+'"><td>'+esc(r.severity)+'</td><td>'+esc(r.viewport)+'</td><td>'+esc(r.page)+'</td><td>'+esc(r.element)+'</td><td>'+esc(r.check)+'</td><td>'+esc(r.details)+'</td></tr>').join(''):'<tr class="row-pass"><td>pass</td><td>All</td><td>All</td><td>Buttons</td><td>No issues found</td><td>All checked pages passed the current button smoke rules.</td></tr>'}
function download(){if(!latest)latest={generatedAt:new Date().toISOString(),summary:summary([]),results:[]};const b=new Blob([JSON.stringify(latest,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='button-smoke-test-report.json';a.click();setTimeout(()=>URL.revokeObjectURL(u),1000)}
function init(){document.getElementById('viewports').innerHTML=VIEWPORTS.map((v,i)=>'<label><input type="checkbox" data-viewport-check value="'+i+'" checked> '+esc(v[0])+'</label>').join('');document.getElementById('targets').innerHTML=PAGES.map((p,i)=>'<label><input type="checkbox" data-page-check value="'+i+'" checked> '+esc(p[0])+'</label>').join('');document.getElementById('run').onclick=run;document.getElementById('download').onclick=download}
init();
</script>
</body>
</html>
